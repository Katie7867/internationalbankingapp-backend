Code 
Summary of Changes
Key fixes:

index.js - Now conditionally uses HTTP (for Docker) or HTTPS (for local dev) based on USE_HTTPS environment variable
index.js - MongoDB connection no longer crashes the app if it fails
Dockerfile - Relaxed health check timing (30s start period instead of 5s)
CircleCI - Better logging and increased sleep time between checks
Environment - Sets USE_HTTPS=false in CircleCI to use HTTP mode
Testing Locally
To test the Docker container locally:

