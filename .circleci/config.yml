version: 2.1

executors:
  node_executor:
    docker:
      - image: cimg/node:22.0
    resource_class: medium
    working_directory: ~/project

  base_docker:
    docker:
      - image: cimg/base:stable
    resource_class: medium
    working_directory: ~/project

  sonar_scanner:
    docker:
      - image: sonarsource/sonar-scanner-cli:latest
    resource_class: medium
    working_directory: ~/project

commands:
  restore_npm_cache:
    steps:
      - restore_cache:
          keys:
            - v1-npm-{{ arch }}-{{ checksum "package-lock.json" }}
            - v1-npm-{{ arch }}
            - v1-npm-
  save_npm_cache:
    steps:
      - save_cache:
          key: v1-npm-{{ arch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

jobs:
  lint_and_test:
    executor: node_executor
    steps:
      - checkout
      - restore_npm_cache

      - run:
          name: Install dependencies
          command: |
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm i
            fi
      - save_npm_cache

      - run:
          name: Sanity check required env
          command: |
            : "${MONGO_URI:=dummy}"
            : "${JWT_SECRET:=dummy}"
            echo "Env OK (dummy values allowed for unit tests that don't connect)."

      # --- Improved ESLint Step ---
      - run:
          name: Run ESLint (fail on errors, ignore warnings)
          command: |
            echo "Running ESLint..."
            npm run lint -- --max-warnings=0 || {
              echo "ESLint found errors. Please fix before merging.";
              exit 1;
            }

      - run:
          name: Run Jest (with coverage)
          command: npm test -- --ci --coverage

      - run:
          name: Make results dirs if missing
          when: always
          command: mkdir -p test-results coverage || true

      - store_test_results:
          path: test-results

      - store_artifacts:
          path: coverage
          when: always

      - persist_to_workspace:
          root: .
          paths:
            - .

  

