docker run -d --name test_banking \
  -p 4000:4000 \
  -e USE_HTTPS=false \
  -e MONGO_URI=mongodb://localhost:27017/dummy \
  -e JWT_SECRET=test123 \
  banking-backend:test

# Check logs
docker logs -f test_banking

# Test health endpoint
curl http://localhost:4000/health

# Cleanup
docker rm -f test_banking
The container should now start successfully and pass the health check! Let me know if you see any errors in the logs.

