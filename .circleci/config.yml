Looking at your setup, I can see several issues causing the container to fail its health check. Let me break down the problems:

Root Causes
HTTPS Server in index.js vs HTTP Health Check: Your index.js creates an HTTPS server with SSL certificates, but your Docker health check and CircleCI test are trying to reach it via HTTP. This mismatch causes connection failures.
Missing SSL Certificates: Your Dockerfile doesn't copy the ./ssl/ directory, so the container can't start the HTTPS server at all.
MongoDB Connection Blocking Startup: Your index.js exits if MongoDB connection fails, but CircleCI uses a dummy MongoDB URI that won't connect.
Separate Files: You're using both index.js (with HTTPS and MongoDB) and app.js (with just Express app). The container runs index.js but your health endpoint is defined in app.js.
Solution
Here's the fixed version. The key change is making index.js work for both local HTTPS development and containerized HTTP deployment:

